services:
  app:
    build: .
    ports:
      - "8001:8000"
    environment:
      - DOWNLOAD_DIR=/app/downloads
      - MAX_WORKERS=15
      - REQUEST_TIMEOUT=30
      - RETRY_ATTEMPTS=4
      - CACHE_DB=/app/cache/cache.db
    volumes:
      - ./downloads:/app/downloads
      - ./cache:/app/cache       # <-- map the folder, not the file
    restart: unless-stopped
    container_name: examtopics-app
    shm_size: 2gb

networks:
  default:
    name: examtopics-network
