<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Question - ExamTopics</title>
    <link rel="stylesheet" href="/static/css/styles.css">
</head>
<body>
    <div class="container">
        <header>
            <div class="nav-links">
                <a id="backToExams" href="#" class="back-link">← Back to Exams</a>
                <a id="backToList" href="#" class="back-link">← Back to Questions List</a>
            </div>
            <h1 id="examTitle">Loading...</h1>
            <p id="questionProgress"></p>
        </header>

        <div id="loading" class="loading">Loading question...</div>
        
        <div id="error" class="error hidden"></div>

        <div id="questionDetail" class="question-page hidden">
            <div class="question-card-full">
                <div class="question-header">
                    <span id="qNumber" class="question-badge"></span>
                    <span id="qTopic" class="topic-badge"></span>
                </div>
                
                <p id="qText" class="question-text"></p>
                
                <div id="qOptions" class="options-list"></div>
                
                <div id="qAnswer" class="answer-section hidden">
                    <h3>Correct Answer: <span id="correctAnswer"></span></h3>
                </div>
                
                <div id="qExplanation" class="explanation hidden">
                    <h3>Explanation</h3>
                    <p id="explanationText"></p>
                </div>
            </div>

            <div class="question-nav">
                <button id="prevBtn" class="btn">← Previous</button>
                <button id="nextBtn" class="btn">Next →</button>
            </div>
        </div>
    </div>

    <script src="/static/js/question.js"></script>
</body>
</html>
